name: System Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  calculation-and-import-checks:
    name: Calculation and import checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check script syntax
        run: |
          node --check scripts/run-system-tests.mjs
          node --check scripts/generate-sample-calculation.mjs
          node --check scripts/validate-price-import.mjs

      - name: Run system tests
        run: npm run test:system

      - name: Regenerate sample calculation
        run: npm run generate:sample-calculation

      - name: Validate pilot import templates
        run: npm run validate:pilot-import

      - name: Validate today-completable import templates
        run: npm run validate:today-completable

      - name: Check generated JSON outputs
        run: |
          node -e "JSON.parse(require('fs').readFileSync('data/sample-calculation-output.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('data/imports/pilot-validation-report.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('data/imports/today-completable-validation-report.json', 'utf8'))"
